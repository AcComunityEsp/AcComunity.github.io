<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACC Assetto Corsa Community - Equipos</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: #0b0b0b; color: white; min-height: 100vh; }
        /* Botón menú y Sidebar */
        .menu-toggle { position: fixed; top: 20px; left: 20px; z-index: 300; background: rgba(20,20,20,0.85); border: 1px solid #333; color: #FFFFFF; font-size: 30px; width: 56px; height: 56px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; }
        .menu-toggle:hover { background: rgba(46,46,46,0.2); transform: scale(1.06); border-color: #FFFFFF; }
        .menu-toggle.active { background: rgba(255,255,255,0.3); }
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 280px; background: #0f0f0f; border-right: 1px solid #222; padding: 90px 24px 40px; overflow-y: auto; z-index: 200; transform: translateX(-100%); transition: transform 0.42s cubic-bezier(0.16,1,0.3,1); box-shadow: 5px 0 30px rgba(0,0,0,0.75); }
        .sidebar.active { transform: translateX(0); }
        .sidebar-logo { text-align: center; margin-bottom: 50px; }
        .sidebar-logo img { width: 110px; transition: transform 0.3s ease; }
        .sidebar-logo a:hover img { transform: scale(1.1); }
        .sidebar-nav { list-style: none; }
        .sidebar-nav li { margin: 10px 0; }
        .sidebar-nav a { display: block; color: #ccc; text-decoration: none; padding: 14px 20px; border-radius: 10px; font-weight: 500; transition: all 0.25s ease; }
        .sidebar-nav a:hover, .sidebar-nav a.active { background: #1a1a1a; color: #FFFFFF; transform: translateX(6px); }
        .sidebar-footer { margin-top: 60px; font-size: 14px; color: #555; text-align: center; }
        .sidebar-footer a { color: #5865F2; text-decoration: none; }
        .sidebar-footer a:hover { text-decoration: underline; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.68); z-index: 150; opacity: 0; visibility: hidden; transition: opacity 0.4s ease; pointer-events: none; }
        .overlay.active { opacity: 1; visibility: visible; pointer-events: all; }
        /* Contenido principal */
        .main-content { padding: 100px 6% 80px; max-width: 1400px; margin: 0 auto; }
        .page-title { text-align: center; margin-bottom: 50px; }
        .page-title h1 { font-size: 42px; letter-spacing: 4px; font-weight: 700; background: linear-gradient(90deg, #FFFFFF, #545454
); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        /* Galería */
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 24px; padding: 0 20px; }
        .team-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 24px 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            color: #111;
            cursor: pointer;
        }
        .team-card:hover { transform: scale(1.05); box-shadow: 0 15px 40px rgba(0,0,0,0.75); }
        .team-card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            margin-bottom: 16px;
            border-radius: 8px;
        }
        .team-card h3 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #222;
        }
        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 500;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: #ffffff;
            color: #111;
            width: 100%;
            max-width: 1100px;
            max-height: 94vh;
            overflow-y: auto;
            border-radius: 16px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 42px;
            color: #333;
            cursor: pointer;
            background: none;
            border: none;
            z-index: 10;
        }
        .modal-body {
            display: flex;
            padding: 50px 40px;
            gap: 50px;
        }
        .modal-left { flex: 1; }
        #modal-img {
            width: 100%;
            max-height: 260px;
            object-fit: contain;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        #modal-name {
            font-size: 52px;
            font-weight: 700;
            letter-spacing: 3px;
            text-align: center;
            color: #0033a0;
        }
        .subtitle {
            text-align: center;
            font-size: 20px;
            color: #555;
            margin-bottom: 15px;
        }
        .blue-bar {
            height: 14px;
            background: #0033a0;
            width: 220px;
            margin: 0 auto 35px;
        }
        /* TARJETAS 100% UNIFORMES */
        .profile-card {
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.2s;
            width: 100%;
            max-width: 170px;
        }
        .profile-card:hover { transform: scale(1.03); }
        .profile-card .avatar {
            width: 100%;
            height: 180px;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .profile-card .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-card .silhouette {
            font-size: 110px;
            color: #0066ff;
        }
        .profile-card .name {
            padding: 14px 12px;
            font-weight: 600;
            font-size: 15.5px;
            color: #222;
            background: white;
            border-top: 1px solid #eee;
        }
        /* Secciones */
        .section-title {
            font-size: 24px;
            font-weight: 700;
            color: #222;
            margin: 40px 0 15px;
        }
        .social-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 18px;
        }
        .social-links a {
            color: #0066ff;
            text-decoration: underline;
        }
        .social-links a:hover { color: #ff8c00; }
        .miembros-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .info h2 { font-size: 28px; margin-bottom: 8px; }
        .info h3 { font-size: 18px; margin: 25px 0 6px; font-weight: 700; }
        .info ul li { padding-left: 22px; position: relative; margin: 9px 0; }
        .info ul li:before { content: "•"; position: absolute; left: 0; color: #ff8c00; font-size: 20px; }
        @media (max-width: 900px) {
            .modal-body { flex-direction: column; }
            .gallery { padding: 0 10px; gap: 18px; }
            .page-title h1 { font-size: 34px; }
        }
        @media (max-width: 600px) {
            .menu-toggle { top: 15px; left: 15px; width: 50px; height: 50px; font-size: 26px; }
            .page-title h1 { font-size: 30px; }
        }
    </style>
</head>
<body>

    <!-- MODAL -->
    <div id="team-modal" class="modal">
        <div class="modal-content">
            <button class="modal-close">×</button>
           
            <div class="modal-body">

                    <p id="modal-subtitle" class="subtitle">SIMRACING</p>
                    <div class="blue-bar"></div>
                   
                    <!-- Info dinámica -->
                    <div id="modal-info" class="info"></div>
                    <!-- Redes Sociales -->

                    <div id="modal-social" class="social-links"></div>
                    <!-- Dirección -->

    </div>

            { name: "Edey Cortés", avatar: "logosequipos/EdeyCortés.PNG" },

            "(Sergi Morera) - Campeón del CRSV 2025"
        ],
        director: { name: "Sergi Morera", avatar: "logosequipos/SergiMorera.PNG" },
        members: [
            { name: "David Lera", avatar: null },

    },
    {
         id: 8,

        creacion: "1/12/2025 | 1ª temporada",
        palmares: [

        ],
        director: { name: "Borja Ramón", avatar: null },
        members: [
            { name: "Carlos Cabrera", avatar: null },
            { name: "Hector Betancor", avatar: null },
            { name: "Miguel Duran", avatar: null },
            { name: "Marc Bayona", avatar: null },
            { name: "Agustin León", avatar: null },
        ],
        social: "<a href=' https://www.instagram.com/canarias_simracing/'>Instagram</a>"
    }
];
        // ====================== FUNCIONES DEL MODAL ======================
        const teamModal = document.getElementById('team-modal');
        const modalClose = document.querySelector('.modal-close');

        function renderTeam(team) {
            // Logo y nombre
            document.getElementById('modal-img').src = team.logo;
            document.getElementById('modal-name').textContent = team.name;

            // Info dinámica (SEDE + CREACIÓN + PALMARÉS)
            let infoHTML = `
                <h3>SEDE</h3>
                <p>${team.sede}</p>
                <h3>CREACIÓN</h3>
                <p>${team.creacion}</p>
                <h3>PALMARÉS</h3>
                <ul>
            `;
            team.palmares.forEach(item => {
                infoHTML += `<li>${item}</li>`;
            });
            infoHTML += `</ul>`;
            document.getElementById('modal-info').innerHTML = infoHTML;

            // Redes Sociales (mejorado)
            let socialContent = team.social;
            if (socialContent === "N/A" || socialContent === "") {
                socialContent = `<p style="color:#777; font-style:italic; margin:10px 0;">Sin perfiles sociales disponibles por el momento</p>`;
            }
            document.getElementById('modal-social').innerHTML = socialContent;

            // Dirección (Director)
            const dirHTML = `
                <div class="profile-card">
                    <div class="avatar">
                        ${team.director.avatar ? `<img src="${team.director.avatar}" alt="Director">` : `<div class="silhouette">👤</div>`}
                    </div>
                    <div class="name">${team.director.name}</div>
                </div>
            `;
            document.getElementById('modal-direccion').innerHTML = dirHTML;

            // Miembros / Pilotos
            let membersHTML = '';
            team.members.forEach(member => {
                membersHTML += `
                    <div class="profile-card">
                        <div class="avatar">
                            ${member.avatar ? `<img src="${member.avatar}" alt="${member.name}">` : `<div class="silhouette">👤</div>`}
                        </div>
                        <div class="name">${member.name}</div>
                    </div>
                `;
            });
            document.getElementById('modal-miembros').innerHTML = membersHTML;
        }

        function showTeamModal(id) {
            const team = teamsData.find(t => t.id === id);
            if (team) {
                renderTeam(team);
                teamModal.style.display = 'flex';
            }
        }

        // Cerrar modal
        modalClose.addEventListener('click', () => { teamModal.style.display = 'none'; });
        teamModal.addEventListener('click', (e) => {
            if (e.target === teamModal) teamModal.style.display = 'none';
        });

        // Menú sidebar
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        function toggleMenu() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            menuToggle.classList.toggle('active');
        }
        menuToggle.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);
        document.querySelectorAll('.sidebar-nav a').forEach(link => {
            link.addEventListener('click', () => {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
                menuToggle.classList.remove('active');
            });
        });

        // Click en cada tarjeta
        document.querySelectorAll('.team-card').forEach(card => {
            card.addEventListener('click', () => {
                const id = parseInt(card.getAttribute('data-id'));
                showTeamModal(id);
            });
        });
    </script>
</body>
</html>
