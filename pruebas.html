<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACC Assetto Corsa Community - Pruebas</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif}
        body{background:#0b0b0b;color:white;line-height:1.6;min-height:100vh}
     

        .menu-toggle{
            position:fixed;top:20px;left:20px;z-index:300;
            background:rgba(20,20,20,0.85);border:1px solid #333;color:#fff;
            font-size:28px;width:54px;height:54px;border-radius:12px;
            cursor:pointer;display:flex;align-items:center;justify-content:center;
            transition:all .3s ease;font-weight:bold;
        }
        .menu-toggle:hover{background:rgba(46,46,46,0.2);transform:scale(1.05);border-color:#fff}
        .menu-toggle.active{background:rgba(255,255,255,0.25)}

        .sidebar{
            position:fixed;left:0;top:0;bottom:0;width:280px;background:#0f0f0f;
            border-right:1px solid #222;padding:90px 24px 40px;overflow-y:auto;
            z-index:200;transform:translateX(-100%);
            transition:transform .4s cubic-bezier(.16,1,.3,1);
            box-shadow:6px 0 35px rgba(0,0,0,.7);
        }
        .sidebar.active{transform:translateX(0)}

        .sidebar-logo{text-align:center;margin-bottom:50px}
        .sidebar-logo img{width:110px;transition:transform .35s ease}
        .sidebar-logo a:hover img{transform:scale(1.12)}

        .sidebar-nav{list-style:none}
        .sidebar-nav li{margin:10px 0}
        .sidebar-nav a{
            display:flex;align-items:center;color:#ccc;text-decoration:none;
            padding:14px 20px;border-radius:10px;font-weight:500;
            transition:all .28s ease;
        }
        .sidebar-nav a:hover,.sidebar-nav a.active{
            background:#1a1a1a;color:#fff;transform:translateX(6px)
        }

        .sidebar-footer{margin-top:60px;font-size:13px;color:#555;text-align:center}
        .sidebar-footer a{color:#5865F2;text-decoration:none}
        .sidebar-footer a:hover{text-decoration:underline}

        .overlay{
            position:fixed;inset:0;background:rgba(0,0,0,0.7);
            z-index:150;opacity:0;visibility:hidden;
            transition:opacity .4s ease;pointer-events:none;
        }
        .overlay.active{opacity:1;visibility:visible;pointer-events:all}

        .main-content{padding:40px 5% 80px;min-height:100vh}
        .page-title{text-align:center;margin:20px 0 50px}
        .page-title h1{
            font-size:46px;letter-spacing:6px;font-weight:700;
            background:linear-gradient(90deg,#fff,#545454);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .container{
            display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
            gap:40px;max-width:1400px;margin:0 auto;
        }

        .card{
            background:#111;border-radius:18px;padding:28px 24px;min-height:580px;
            box-shadow:0 10px 30px rgba(0,0,0,.65);display:flex;
            flex-direction:column;justify-content:space-between;
            transition:all .35s ease;border:1px solid #1a1a1a;
        }
        .card:hover{
            transform:translateY(-12px);
            box-shadow:0 20px 50px rgba(0,0,0,.8);
            border-color:#444;
        }
        .card.center{
            transform:translateY(-15px);
            border-color:#555;
            background:linear-gradient(135deg,#111 0%,#1a1a1a 100%);
        }

        .card h2{
            font-size:23px;margin-bottom:20px;text-align:center;
            min-height:55px;display:flex;align-items:center;justify-content:center;
        }
        .card img{
            max-width:100%;border-radius:10px;margin:20px auto;
            box-shadow:0 6px 20px rgba(0,0,0,.5);display:block;
        }

        .card button{
            margin-top:20px;background:#fff;color:#000;border:none;
            padding:15px 28px;border-radius:12px;font-weight:700;
            font-size:15px;cursor:pointer;transition:all .3s ease;width:100%;
        }
        .card button:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 25px rgba(255,255,255,.18);
            background:#f8f8f8;
        }

        /* 👇 NUEVO: contenedor centrado para los 3 botones */
        .result-buttons{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center; /* 👈 ESTE ES EL QUE FALTABA */
    gap:12px;
    flex:1; /* 👈 ocupa el espacio para poder centrarse */
}
        .result-buttons button{
            width:80%;
        }

        .modal{
            position:fixed;top:0;left:0;width:100%;height:100%;
            background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;
            opacity:0;visibility:hidden;transition:all .3s ease;z-index:400;
        }
        .modal.active{opacity:1;visibility:visible}

        .modal-content{
            position:relative;background:#111;padding:30px 25px;
            border-radius:18px;max-width:400px;width:90%;text-align:center;
            color:white;box-shadow:0 10px 30px rgba(0,0,0,.7);
            border:1px solid #333;
        }

        .close-btn{
            position:absolute;top:15px;right:20px;font-size:26px;
            cursor:pointer;color:#fff;
        }

        @media(max-width:768px){
            .page-title h1{font-size:36px;letter-spacing:4px}
            .menu-toggle{top:15px;left:15px;width:48px;height:48px;font-size:26px}
        }
    </style>
</head>
<body>

<button class="menu-toggle" id="menuToggle">≡</button>
<div class="overlay" id="overlay"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <a href="index.html"><img src="logoACC.png"></a>
    </div>
    <ul class="sidebar-nav">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="calendarios.html">Calendarios</a></li>
        <li><a href="pruebas.htlm" class="active">Pruebas</a></li>
        <li><a href="equipos.html">Equipos</a></li>
    </ul>
</aside>

<main class="main-content">
    <div class="page-title"><h1>PRUEBAS</h1></div>

    <section class="container">

        <div class="card">
            <div style="text-align:center;">
                <h2>A ESPERA DEL SIGUIENTE EVENTO</h2>
                <img src="CARTELRSTMISIONES.PNG">
            </div>
            <button onclick="openModal('CRSTV - RallysPrint de Cabalango','Campeonato: CRSTV\nFecha: Por definir')">Ver detalles</button>
        </div>

        <div class="card center">
            <div style="text-align:center;">
                <h2>CRSV - Rallysprint de Maises de Voltregà</h2>
                <img src="Cartelmaises.png">
            </div>
            <button oncli.ck="window.open('https://docs.google.com/forms/d/e/1FAIpQLScXYTrEdGGQPen4vsCauExFCpmqvSYu6daMmFB7JogvMXGWnA/viewform','_blank')">Inscripciones cerradas</button>
            <button onclick="window.open('https://acc-d.github.io/descargas-acc/','_blank')">Contenido</button>
        </div>

        <div class="card">
            <div style="text-align:center;">
                <h2>RESULTADOS</h2>
            </div>

            <!-- 👇 AQUÍ ESTÁ EL CAMBIO -->
            <div class="result-buttons">
                <button onclick="window.open('https://docs.google.com/spreadsheets/d/1_TobEh1V557vy8L2yQbWnVY0bBtfchjAoMusqu924nc/edit','_blank')">Resultados Serras de FAFE</button>
                <button onclick="window.open('https://docs.google.com/spreadsheets/d/1_TobEh1V557vy8L2yQbWnVY0bBtfchjAoMusqu924nc/edit','_blank')">Resultados RS Carreño</button>
                <button onclick="window.open('https://docs.google.com/spreadsheets/d/1_TobEh1V557vy8L2yQbWnVY0bBtfchjAoMusqu924nc/edit','_blank')">Resultados rallysprint de tierra de misiones</button>
            </div>

        </div>

    </section>
</main>

<script>
const menuToggle=document.getElementById('menuToggle');
const sidebar=document.getElementById('sidebar');
const overlay=document.getElementById('overlay');

function toggleMenu(){
    sidebar.classList.toggle('active');
    overlay.classList.toggle('active');
    menuToggle.classList.toggle('active');
}

menuToggle.addEventListener('click',toggleMenu);
overlay.addEventListener('click',toggleMenu);
</script>

</body>
</html>
